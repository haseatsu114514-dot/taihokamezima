name: update-report

on:
  workflow_dispatch:
    inputs:
      bootstrap_days:
        description: "初回だけ直近何日分をまとめて取得するか。通常は0、初回は30推奨"
        required: false
        default: "0"
  schedule:
    - cron: "30 16 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "data/**"
      - "reports/**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "taihokamezima-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BOOTSTRAP_DAYS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap_days || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Collect latest min-repo data
          run: python scripts/collect_minrepo.py --config config.toml


      - name: Build analysis reports
        run: python scripts/analyze_minrepo.py --config config.toml

      - name: Prepare Pages files
        run: |
          touch reports/.nojekyll
          cp reports/latest_analysis.json reports/analysis.json
          cp reports/latest_report.md reports/report.md

      - name: Commit updated data and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Taiho Kamejima report [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
