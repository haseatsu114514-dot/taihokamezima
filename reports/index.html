<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>taiho_kamejima report</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e8;
      --panel: #fffaf3;
      --ink: #1f1b16;
      --accent: #af3b2f;
      --line: #d8c9b1;
    }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: radial-gradient(circle at top, #fff3db 0%, var(--bg) 62%);
      color: var(--ink);
    }
    main {
      max-width: 900px;
      margin: 40px auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(58, 41, 22, 0.08);
    }
    h1 {
      margin-top: 0;
      color: var(--accent);
      font-size: 1.9rem;
    }
    .content {
      line-height: 1.8;
      white-space: normal;
    }
  </style>
</head>
<body>
  <main>
    <h1>taiho_kamejima report</h1>
    <div class="content"># タイホウ亀島レポート<br><br>- データ未取得</div>
  </main>
</body>
</html>
